<!DOCTYPE html>
<!--
  ============================================================
  chart_1_1.html — 주제1 불만고객형 / 1-1 상담건수별 해지율
  Flask 경로: templates/chart_1_1.html

  [연결 파일]
    static/css/chart_1_1.css  → 이 페이지 전용 스타일
    static/js/chart_1_1.js   → 차트 렌더링 로직
    CDN: Chart.js 4.4.1

  [데이터 흐름]
    Flask /api/chart_1_1
      → fetch() 로 JSON 수신
      → chart_1_1.js 에서 Chart.js 렌더링

  [수정 포인트]
    - 카드 제목  → .chart-title 텍스트
    - 인사이트 칩 → .insight-chip 텍스트
    - 임계점 설명 → .threshold-note 텍스트
  ============================================================
-->
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>1-1 상담건수별 해지율 — 불만고객형</title>

  <!-- 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/chart_1_1.css') }}">

  <!-- Chart.js (JS보다 먼저 로드) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="card">

  <!-- ── 헤더 ── -->
  <div class="card-head">
    <span class="chart-num">01</span>
    <span class="chart-title">상담 건수별 해지율</span>
    <span class="topic-badge">🔴 불만고객형</span>
  </div>

  <!-- ── 인사이트 칩 ── -->
  <div class="insight-bar">
    <span class="insight-chip chip-warn" id="chip-threshold">⚠ 임계점 계산 중...</span>
    <span class="insight-chip chip-info" id="chip-avg">전체 평균 계산 중...</span>
    <span class="insight-chip chip-muted">X축: 상담전화 횟수 · Y축: 해지율(%)</span>
  </div>

  <!-- ── 차트 영역 ── -->
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <!-- ── 하단 설명 ── -->
  <div class="threshold-note">
    <div class="threshold-line-icon"></div>
    <span id="threshold-text">데이터 로딩 중...</span>
  </div>

</div>

<!-- JS (맨 마지막) -->
<script src="{{ url_for('static', filename='js/chart_1_1.js') }}"></script>
</body>
</html>

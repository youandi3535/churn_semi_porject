<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title> Oneplus³ </title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#06080f; --surface:#0c1020; --surface2:#111827;
  --border:#1a2035; --text:#e2e8f0; --muted:#4e627a;
  --all:#6366f1; --a:#ef4444; --b:#f97316; --c:#eab308; --d:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,#0c1020,#06080f);position:sticky;top:0;z-index:100;}
header h1{font-size:1.3rem;font-weight:900;letter-spacing:-.5px;}
header p{font-size:.73rem;color:var(--muted);margin-top:2px;}
.hdr-badge{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:4px 12px;
  border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:1px;margin-left:auto;}
.wrapper{padding:24px 40px;max-width:1440px;margin:0 auto;}
.grade-section{margin-bottom:18px;}
.sec-label{font-size:.68rem;font-weight:700;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px;}
.grade-btns{display:flex;gap:8px;flex-wrap:wrap;}
.grade-btn{padding:10px 24px;border:2px solid transparent;border-radius:50px;
  font-family:'Noto Sans KR',sans-serif;font-size:.88rem;font-weight:700;
  cursor:pointer;transition:all .22s ease;color:#fff;}
.btn-all{background:var(--all);} .btn-a{background:var(--a);}
.btn-b{background:var(--b);} .btn-c{background:var(--c);color:#111;}
.btn-d{background:var(--d);color:#111;}
.grade-btn:hover{transform:translateY(-2px);filter:brightness(1.18);}
.grade-btn.active{transform:scale(1.1);box-shadow:0 0 22px rgba(255,255,255,.2);border-color:#fff;}
.grade-bar{display:none;align-items:center;gap:10px;padding:11px 18px;margin-bottom:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:.82rem;}
.grade-bar.show{display:flex;}
.grade-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.chatbot-section{margin-bottom:26px;}
.chatbot-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 26px;}
.chatbot-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;
  padding-bottom:13px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.ai-badge{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:.68rem;
  font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px;}
.chatbot-header h2{font-size:.95rem;font-weight:700;}
.powered{font-size:.72rem;color:var(--muted);margin-left:auto;}
.ai-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ai-btn{padding:7px 14px;border:1px solid var(--border);border-radius:20px;
  background:var(--surface2);color:var(--text);font-size:.78rem;
  font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;}
.ai-btn:hover{border-color:var(--all);color:var(--all);}
.ai-btn.primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;color:#fff;}
.ai-btn.primary:hover{filter:brightness(1.15);}
.chat-messages{min-height:80px;max-height:210px;overflow-y:auto;padding:13px;
  background:var(--bg);border-radius:10px;margin-bottom:12px;
  font-size:.83rem;line-height:1.85;white-space:pre-wrap;}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg-auto{color:#a5b4fc;} .msg-user{color:#fbbf24;margin-top:10px;font-weight:600;}
.msg-bot{color:var(--text);} .msg-loading{color:var(--muted);font-style:italic;}
.chat-input-row{display:flex;gap:8px;}
.chat-input{flex:1;padding:10px 16px;background:var(--bg);border:1px solid var(--border);
  border-radius:50px;color:var(--text);font-size:.83rem;
  font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.chat-input:focus{border-color:var(--all);}
.chat-send{padding:10px 22px;background:var(--all);color:#fff;border:none;border-radius:50px;
  font-weight:700;font-size:.83rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:filter .2s;}
.chat-send:hover{filter:brightness(1.2);}

/* ★★ 2열 × 3행 그리드 ★★ */
.charts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-bottom:32px;}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr;}}

/* ★★ 카드 hover 글로우 효과 ★★ */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:24px;overflow:visible;position:relative;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .4s;}
.chart-card:hover{
  transform:translateY(-8px) scale(1.012);
  box-shadow:0 20px 50px rgba(99,102,241,.28),0 0 0 1px rgba(99,102,241,.4);
  border-color:rgba(99,102,241,.55);}
.chart-card.pop{transform:scale(1.055);}
.chart-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card-left{display:flex;align-items:center;gap:8px;}
.chart-emoji{font-size:1.1rem;}
.chart-title{font-size:.83rem;font-weight:700;color:var(--muted);}
.explain-btn{padding:5px 12px;border:1px solid var(--border);border-radius:14px;
  background:transparent;color:var(--muted);font-size:.73rem;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;}
.explain-btn:hover{border-color:var(--all);color:var(--all);}

/* ★ 그래프 높이 크게 ★ */
.chart-wrap{position:relative;height:340px;}
</style>
</head>
<body>

<header>
  <div style="font-size:1.5rem">📡</div>
  <div>
    <h1>통신 고객 이탈 예측 대시보드!!!!!!</h1>
    <p>Customer Churn Prediction · 데이터 기반 이탈 예측 시스템</p>
  </div>
<!--  <span class="hdr-badge">✦ GEMINI 2.5 PRO</span>-->
    <span class="hdr-badge">✦ GROQ </span>
</header>

<div class="wrapper">

<div class="grade-section">
  <div class="sec-label">▸ 위험 등급 필터</div>
  <div class="grade-btns">
    <button class="grade-btn btn-all active" data-grade="ALL">전체 보기</button>
    <button class="grade-btn btn-a"          data-grade="A">🔴 A등급 — 최고위험</button>
    <button class="grade-btn btn-b"          data-grade="B">🟠 B등급 — 고위험</button>
    <button class="grade-btn btn-c"          data-grade="C">🟡 C등급 — 중위험</button>
    <button class="grade-btn btn-d"          data-grade="D">🟢 D등급 — 저위험</button>
  </div>
</div>

<div class="grade-bar" id="gradeBar">
  <div class="grade-dot" id="gradeDot"></div>
  <span id="gradeText"></span>
</div>

<div class="chatbot-section">
  <div class="chatbot-card">
    <div class="chatbot-header">
      <span class="ai-badge">AI ADVISOR</span>
      <h2>이탈 예측 인사이트</h2>
      <span class="powered">Powered by Groq Pro</span>
    </div>
    <div class="ai-btns">
      <button class="ai-btn primary" id="analyzeBtn">📊 종합 분석</button>
      <button class="ai-btn" onclick="explainHypothesis(1)">📘 가설1</button>
      <button class="ai-btn" onclick="explainHypothesis(2)">📘 가설2</button>
      <button class="ai-btn" onclick="explainHypothesis(3)">📘 가설3</button>
      <button class="ai-btn" onclick="explainHypothesis(4)">📘 가설4</button>
      <button class="ai-btn" onclick="explainHypothesis(5)">📘 가설5</button>
      <button class="ai-btn" onclick="explainHypothesis(6)">📘 가설6</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <span class="msg-loading">데이터 로딩 중...</span>
    </div>
    <div class="chat-input-row">
      <input id="chatInput" class="chat-input" type="text"
             placeholder="예: A등급 고객의 주요 이탈 원인은 무엇인가요?"/>
      <button id="chatSendBtn" class="chat-send">전송</button>
    </div>
  </div>
</div>

<div class="charts-grid" id="chartsGrid">
  <div class="chart-card" id="card1">
    <div class="chart-card-head">
      <div class="card-left"><span class="chart-emoji">🟦</span>
        <span class="chart-title">가설1 · 상담전화건수 vs 해지건수</span></div>
      <button class="explain-btn" onclick="explainHypothesis(1)">📘 설명</button>
    </div>
    <div class="chart-wrap"><canvas id="chart1"></canvas></div>
  </div>
  <div class="chart-card" id="card2">
    <div class="chart-card-head">
      <div class="card-left"><span class="chart-emoji">🟩</span>
        <span class="chart-title">가설2 · 가입일 구간 vs 해지율</span></div>
      <button class="explain-btn" onclick="explainHypothesis(2)">📘 설명</button>
    </div>
    <div class="chart-wrap"><canvas id="chart2"></canvas></div>
  </div>
  <div class="chart-card" id="card3">
    <div class="chart-card-head">
      <div class="card-left"><span class="chart-emoji">🟨</span>
        <span class="chart-title">가설3 · 총통화시간 vs 해지율</span></div>
      <button class="explain-btn" onclick="explainHypothesis(3)">📘 설명</button>
    </div>
    <div class="chart-wrap"><canvas id="chart3"></canvas></div>
  </div>
  <div class="chart-card" id="card4">
    <div class="chart-card-head">
      <div class="card-left"><span class="chart-emoji">🟥</span>
        <span class="chart-title">가설4 · 시간대별 통화비율 해지 vs 유지</span></div>
      <button class="explain-btn" onclick="explainHypothesis(4)">📘 설명</button>
    </div>
    <div class="chart-wrap"><canvas id="chart4"></canvas></div>
  </div>
  <div class="chart-card" id="card5">
    <div class="chart-card-head">
      <div class="card-left"><span class="chart-emoji">🟪</span>
        <span class="chart-title">가설5 · 상담강도 vs 해지율</span></div>
      <button class="explain-btn" onclick="explainHypothesis(5)">📘 설명</button>
    </div>
    <div class="chart-wrap"><canvas id="chart5"></canvas></div>
  </div>
  <div class="chart-card" id="card6">
    <div class="chart-card-head">
      <div class="card-left"><span class="chart-emoji">⬛</span>
        <span class="chart-title">가설6 · 시간당요금 vs 해지율 (버블/스캐터)</span></div>
      <button class="explain-btn" onclick="explainHypothesis(6)">📘 설명</button>
    </div>
    <div class="chart-wrap"><canvas id="chart6"></canvas></div>
  </div>
</div>
</div>

<script>
/* ═══════════════════════════════════════
   [A] 전역 변수
═══════════════════════════════════════ */
let charts={}, lastData=null, nowGrade='ALL';
const GRADE_COLOR={ALL:'#6366f1',A:'#ef4444',B:'#f97316',C:'#eab308',D:'#22c55e'};
const GRADE_MSG={
  ALL:'전체 고객 데이터를 표시합니다.',
  A:'🔴 A등급(최고위험): 상담전화 多·신규가입·낮은통화량 구간이 강조됩니다.',
  B:'🟠 B등급(고위험): 고위험 특성 구간이 강조됩니다.',
  C:'🟡 C등급(중위험): 중위험 구간이 강조됩니다.',
  D:'🟢 D등급(저위험): 저위험·충성고객 구간이 강조됩니다.',
};
const DARK={color:'#4e627a', grid:'#1a2035', tick:'#7a92aa'};

/* ═══════════════════════════════════════
   [B] 페이지 로드
═══════════════════════════════════════ */
window.addEventListener('load',()=>loadData('ALL'));

/* ═══════════════════════════════════════
   [C] 버튼 이벤트
═══════════════════════════════════════ */
document.querySelectorAll('.grade-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    nowGrade=this.dataset.grade;
    const bar=document.getElementById('gradeBar');
    document.getElementById('gradeDot').style.background=GRADE_COLOR[nowGrade];
    document.getElementById('gradeText').textContent=GRADE_MSG[nowGrade];
    nowGrade==='ALL'?bar.classList.remove('show'):bar.classList.add('show');
    loadData(nowGrade);
  });
});
document.getElementById('analyzeBtn').addEventListener('click',()=>{if(lastData)autoInsight(lastData);});

/* ═══════════════════════════════════════
   [D-1] loadData
═══════════════════════════════════════ */
async function loadData(grade){
  try{
    const res=await fetch('/get_all_data',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({grade})});
    const data=await res.json();
    lastData=data;
    drawChart1(data.h1); drawChart2(data.h2); drawChart3(data.h3);
    drawChart4(data.h4); drawChart5(data.h5); drawChart6(data.h6);
    popCards(grade);
    if(grade==='ALL') autoInsight(data);
  }catch(e){console.error('loadData 오류:',e);}
}

/* ═══════════════════════════════════════
   [D-2] 종합 분석
═══════════════════════════════════════ */
async function autoInsight(data){
  const box=document.getElementById('chatMessages');
  box.innerHTML='<span class="msg-loading">🤖 AI 종합 분석 중... (수 초 소요)</span>';
  try{
    const res=await fetch('/chat_insight',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({auto_mode:true,graph_data:data})});
    const r=await res.json();
    box.innerHTML=r.success?`<span class="msg-auto">${r.answer}</span>`
      :`<span style="color:#ef4444">⚠ ${r.answer}</span>`;
  }catch(e){box.innerHTML='<span style="color:#ef4444">⚠ AI 서비스 오류</span>';}
}

/* ═══════════════════════════════════════
   [D-3] 가설 개별 설명
═══════════════════════════════════════ */
async function explainHypothesis(id){
  if(!lastData){alert('데이터 로딩 중');return;}
  const box=document.getElementById('chatMessages');
  box.innerHTML=`<span class="msg-loading">🤖 가설${id} 분석 중...</span>`;
  try{
    const res=await fetch('/chat_insight',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode:'hypothesis',hypothesis_id:id,graph_data:lastData})});
    const r=await res.json();
    box.innerHTML=r.success?`<span class="msg-auto">${r.answer}</span>`
      :`<span style="color:#ef4444">⚠ ${r.answer}</span>`;
  }catch(e){box.innerHTML='<span style="color:#ef4444">⚠ 오류</span>';}
  box.scrollTop=box.scrollHeight;
}

/* ═══════════════════════════════════════
   [D-4] 사용자 질문
═══════════════════════════════════════ */
async function sendChat(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim(); if(!msg) return;
  const box=document.getElementById('chatMessages');
  box.innerHTML+=`<div class="msg-user">👤 ${msg}</div>`;
  box.innerHTML+=`<div class="msg-loading" id="loadMsg">🤖 답변 생성 중...</div>`;
  box.scrollTop=box.scrollHeight; input.value='';
  try{
    const res=await fetch('/chat_insight',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,graph_data:lastData,auto_mode:false})});
    const r=await res.json();
    const el=document.getElementById('loadMsg'); if(el) el.remove();
    box.innerHTML+=`<div class="msg-bot">🤖 ${r.answer}</div>`;
  }catch(e){box.innerHTML+='<div style="color:#ef4444">⚠ 오류</div>';}
  box.scrollTop=box.scrollHeight;
}
document.getElementById('chatSendBtn').addEventListener('click',sendChat);
document.getElementById('chatInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendChat();});

/* ═══════════════════════════════════════
   [E] 차트 공통 함수
═══════════════════════════════════════ */
function makeChart(id,config){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),config);}
function xyScale(y){return{
  x:{ticks:{color:DARK.tick},grid:{color:DARK.grid}},
  y:{ticks:{color:DARK.tick},grid:{color:DARK.grid},title:{display:true,text:y,color:DARK.color},beginAtZero:true}
};}

/* ★★ 핵심 강조 플러그인 ★★
   Chart.js가 막대 다 그린 뒤(afterDatasetsDraw)
   강조 인덱스 막대 위에 더 크고 밝은 사각형 덮어 그림
   GROW=좌우로 더 넓게, LIFT=위로 더 솟게
*/
function makeBarHighlightPlugin(idxArr,gradeColor,suffix){
  return{id:'hl_'+Math.random(),afterDatasetsDraw(chart){
    if(!idxArr||!idxArr.length||nowGrade==='ALL') return;
    const{ctx,data}=chart;
    chart.getDatasetMeta(0).data.forEach((bar,i)=>{
      if(!idxArr.includes(i)) return;
      const x=bar.x,y=bar.y,w=bar.width,bottom=chart.scales.y.getPixelForValue(0);
      const GROW=9, LIFT=16;
      ctx.save();
      ctx.fillStyle=gradeColor;
      ctx.beginPath();
      ctx.roundRect(x-w/2-GROW,y-LIFT,w+GROW*2,bottom-y+LIFT,8);
      ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2.5;ctx.stroke();
      ctx.fillStyle='#ffffff';ctx.font='bold 12px Noto Sans KR,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(data.datasets[0].data[i]+(suffix||''),x,y-LIFT-5);
      ctx.restore();
    });
  }};
}

/* ═ 가설1: 세로 막대 ═ */
function drawChart1(h){
  const base=GRADE_COLOR[nowGrade], isG=nowGrade!=='ALL';
  const bg=h.labels.map((_,i)=>(isG&&h.highlight?.includes(i))?base+'55':base+(isG?'1a':'99'));
  makeChart('chart1',{type:'bar',
    data:{labels:h.labels,datasets:[{label:'해지건수',data:h.values,
      backgroundColor:bg,borderColor:'transparent',borderWidth:0,borderRadius:7}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:800,easing:'easeInOutQuart'},
      plugins:{legend:{labels:{color:DARK.tick}},tooltip:{callbacks:{label:c=>`해지건수: ${c.raw}건`}}},
      scales:xyScale(h.y_label)},
    plugins:[makeBarHighlightPlugin(h.highlight,base,'건')]});
}


/* ═ 가설2: 라인 ═ */
function drawChart2(h){
  const base=GRADE_COLOR[nowGrade], isG=nowGrade!=='ALL';
  makeChart('chart2',{type:'line',
    data:{labels:h.labels,datasets:[{label:'해지율 (%)',data:h.values,
      borderColor:base,backgroundColor:base+'20',borderWidth:2.5,
      pointRadius:h.labels.map((_,i)=>(isG&&h.highlight?.includes(i))?13:5),
      pointBackgroundColor:h.labels.map((_,i)=>(isG&&h.highlight?.includes(i))?'#fff':base),
      pointBorderColor:base,
      pointBorderWidth:h.labels.map((_,i)=>(isG&&h.highlight?.includes(i))?3:1),
      tension:0.4,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:700},
      plugins:{legend:{labels:{color:DARK.tick}}},scales:xyScale(h.y_label)}});
}

/* ═ 가설3: 도넛 ═ */
function drawChart3(h){
  const isG=nowGrade!=='ALL';
  const pal=['#ef4444','#f97316','#eab308','#22c55e'];
  makeChart('chart3',{type:'doughnut',
    data:{labels:h.labels,datasets:[{label:'해지율 (%)',data:h.values,
      backgroundColor:pal.map((c,i)=>(isG&&h.highlight?.includes(i))?c:c+(isG?'44':'bb')),
      borderColor:'#06080f',borderWidth:4,hoverOffset:18}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:700},
      plugins:{legend:{position:'bottom',labels:{color:DARK.tick,padding:16}}}}});
}

/* ═ 가설4: 레이더 ═ */
function drawChart4(h){
  makeChart('chart4',{type:'radar',
    data:{labels:h.labels,datasets:[
      {label:'해지 고객',data:h.churn,backgroundColor:'rgba(239,68,68,.18)',
        borderColor:'#ef4444',borderWidth:2.5,pointRadius:6,pointBackgroundColor:'#ef4444'},
      {label:'유지 고객',data:h.retain,backgroundColor:'rgba(34,197,94,.18)',
        borderColor:'#22c55e',borderWidth:2.5,pointRadius:6,pointBackgroundColor:'#22c55e'}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:700},
      plugins:{legend:{labels:{color:DARK.tick}}},
      scales:{r:{ticks:{color:DARK.tick,backdropColor:'transparent'},
        grid:{color:DARK.grid},angleLines:{color:DARK.grid},
        pointLabels:{color:DARK.tick,font:{size:13}},beginAtZero:true}}}});
}

/* ═ 가설5: 수평 막대 ═ */
function drawChart5(h){
  const base=GRADE_COLOR[nowGrade], isG=nowGrade!=='ALL';
  const bg=h.labels.map((_,i)=>(isG&&h.highlight?.includes(i))?base:base+(isG?'22':'99'));
  const bc=h.labels.map((_,i)=>(isG&&h.highlight?.includes(i))?'#fff':'transparent');
  const bw=h.labels.map((_,i)=>(isG&&h.highlight?.includes(i))?2:0);
  makeChart('chart5',{type:'bar',
    data:{labels:h.labels,datasets:[{label:'해지율 (%)',data:h.values,
      backgroundColor:bg,borderColor:bc,borderWidth:bw,borderRadius:7}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,animation:{duration:700},
      plugins:{legend:{labels:{color:DARK.tick}},
        tooltip:{callbacks:{label:c=>`해지율: ${c.raw}%`}}},
      scales:{x:{ticks:{color:DARK.tick},grid:{color:DARK.grid},
        title:{display:true,text:h.y_label,color:DARK.color},beginAtZero:true},
        y:{ticks:{color:DARK.tick},grid:{color:DARK.grid}}}}});
}

/* ═ 가설6: 버블+스캐터 ═
   x=시간당요금, y=해지율, r=고객수
   강조 버블: 선명 색 + 흰 테두리 + 구간명 라벨
*/
function drawChart6(h){
  const base=GRADE_COLOR[nowGrade], isG=nowGrade!=='ALL';
  const bgC=h.scatter.map((_,i)=>(isG&&h.highlight?.includes(i))?base+'cc':base+(isG?'33':'88'));
  const bdC=h.scatter.map((_,i)=>(isG&&h.highlight?.includes(i))?'#ffffff':base+'66');
  const bdW=h.scatter.map((_,i)=>(isG&&h.highlight?.includes(i))?3:1);
  makeChart('chart6',{type:'bubble',
    data:{datasets:[{label:'요금구간별 해지율',data:h.scatter,
      backgroundColor:bgC,borderColor:bdC,borderWidth:bdW,
      hoverBackgroundColor:base,hoverBorderColor:'#ffffff',hoverBorderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:700},
      plugins:{legend:{labels:{color:DARK.tick}},
        tooltip:{callbacks:{label:ctx=>{
          const d=ctx.raw,lbl=h.labels?h.labels[ctx.dataIndex]:'';
          return[`구간: ${lbl}`,`시간당요금: ${d.x.toFixed(4)}`,`해지율: ${d.y}%`,`고객수: ~${d.r*300}명`];
        }}}},
      scales:{x:{ticks:{color:DARK.tick},grid:{color:DARK.grid},
        title:{display:true,text:'평균 시간당 요금',color:DARK.color}},
        y:{ticks:{color:DARK.tick},grid:{color:DARK.grid},
          title:{display:true,text:'해지율 (%)',color:DARK.color},beginAtZero:true}}},
    plugins:[{id:'bubbleLbl',afterDatasetsDraw(chart){
      if(!h.highlight||!h.highlight.length||nowGrade==='ALL') return;
      const{ctx}=chart;
      chart.getDatasetMeta(0).data.forEach((pt,i)=>{
        if(!h.highlight.includes(i)) return;
        ctx.save();
        ctx.fillStyle='#ffffff';ctx.font='bold 11px Noto Sans KR,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(h.labels?h.labels[i]:'',pt.x,pt.y-pt.options.radius-6);
        ctx.restore();
      });
    }}]});
}

/* ═══════════════════════════════════════
   [F] 카드 팝 애니메이션
═══════════════════════════════════════ */
function popCards(grade){
  const color=GRADE_COLOR[grade];
  document.querySelectorAll('.chart-card').forEach((card,i)=>{
    setTimeout(()=>{
      card.style.borderColor=color;
      card.style.boxShadow=`0 0 32px ${color}60,0 10px 30px rgba(0,0,0,.4)`;
      card.classList.add('pop');
      setTimeout(()=>{card.classList.remove('pop');card.style.borderColor='';card.style.boxShadow='';},1000);
    },i*80);
  });
}
</script>

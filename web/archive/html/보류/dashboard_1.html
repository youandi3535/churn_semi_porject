<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통신 고객 이탈 예측 대시보드</title>

    <!-- ===== 외부 라이브러리 ===== -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* =========================================================
           🎨 CSS 구역
           수정하고 싶은 색상/크기는 여기 변수만 바꾸면 전체 반영!
           ========================================================= */

        :root {
            --bg:        #0f1117;      /* 배경색 */
            --card:      #1a1d27;      /* 카드 배경 */
            --border:    #2a2d3e;      /* 테두리 */
            --text:      #e8eaf0;      /* 기본 글씨 */
            --muted:     #6b7280;      /* 흐린 글씨 */

            /* ABCD 등급 색상 - 버튼/차트 모두 여기서 관리 */
            --col-all:   #6366f1;      /* 전체  - 인디고 */
            --col-a:     #ef4444;      /* A등급 - 빨강 (최고위험) */
            --col-b:     #f97316;      /* B등급 - 주황 */
            --col-c:     #eab308;      /* C등급 - 노랑 */
            --col-d:     #22c55e;      /* D등급 - 초록 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        /* ── 페이지 제목 ── */
        .page-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 28px;
            letter-spacing: -0.5px;
        }

        /* ── 상단 컨트롤 바 (ABCD 버튼 + 챗봇) ── */
        .control-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            align-items: flex-start;
        }

        /* ── ABCD 버튼 묶음 ── */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .grade-btn {
            padding: 12px 22px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
        }

        .grade-btn:hover   { transform: translateY(-2px); }
        .grade-btn.active  { border-color: white; transform: scale(1.08); }

        /* 버튼 색상 */
        .btn-all { background: var(--col-all); }
        .btn-a   { background: var(--col-a); }
        .btn-b   { background: var(--col-b); }
        .btn-c   { background: var(--col-c); color: #111; }
        .btn-d   { background: var(--col-d); color: #111; }

        /* ── 챗봇 박스 ── */
        .chatbot-box {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            min-width: 320px;
        }

        .chatbot-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--col-all);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .chat-messages {
            height: 160px;
            overflow-y: auto;
            padding: 8px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .chat-msg-auto { color: #a5b4fc; white-space: pre-wrap; }
        .chat-msg-user { color: #fbbf24; margin-top: 8px; }
        .chat-msg-bot  { color: var(--text); margin-top: 4px; }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.85rem;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .chat-input:focus { outline: none; border-color: var(--col-all); }

        .chat-send {
            padding: 8px 16px;
            background: var(--col-all);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* ── 그래프 6개 그리드 ── */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);   /* 3열 */
            gap: 20px;
            margin-bottom: 28px;
        }

        /* 그래프 카드 1개 */
        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-color 0.3s,
                        box-shadow 0.3s;
        }

        /* 등급 버튼 눌렸을 때 확대 효과 */
        .chart-card.highlight {
            transform: scale(1.06);
            box-shadow: 0 0 24px rgba(99, 102, 241, 0.4);
        }

        .chart-card-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 14px;
            text-align: center;
        }

        .chart-wrap {
            position: relative;
            height: 220px;
        }

        /* ── 고위험 고객 테이블 ── */
        .table-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
        }

        .table-section-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .risk-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .risk-table th {
            background: #23263a;
            padding: 10px 12px;
            text-align: left;
            font-weight: 700;
            color: var(--muted);
        }

        .risk-table td {
            padding: 9px 12px;
            border-bottom: 1px solid var(--border);
        }

        .risk-table tr:hover td { background: #23263a; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge-A { background: var(--col-a);  color: white; }
        .badge-B { background: var(--col-b);  color: white; }
        .badge-C { background: var(--col-c);  color: #111; }
        .badge-D { background: var(--col-d);  color: #111; }

        /* ── 반응형 ── */
        @media (max-width: 1100px) {
            .charts-grid    { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 700px) {
            .control-bar    { flex-direction: column; }
            .charts-grid    { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <!-- =========================================================
         📌 1. 페이지 제목
         수정: 글자만 바꾸면 됨
         ========================================================= -->
    <h1 class="page-title">📊 통신 고객 이탈 예측 대시보드</h1>


    <!-- =========================================================
         📌 2. 컨트롤 바 (ABCD 버튼 + 챗봇)
         ========================================================= -->
    <div class="control-bar">

        <!-- ── 2-1. ABCD 등급 버튼 ──
             data-grade 값이 Flask로 전달됨
             버튼 추가/삭제 → 여기서 <button> 추가/삭제 -->
        <div class="btn-group">
            <button class="grade-btn btn-all active" data-grade="ALL">전체</button>
            <button class="grade-btn btn-a"          data-grade="A">A등급 (최고위험)</button>
            <button class="grade-btn btn-b"          data-grade="B">B등급 (고위험)</button>
            <button class="grade-btn btn-c"          data-grade="C">C등급 (중위험)</button>
            <button class="grade-btn btn-d"          data-grade="D">D등급 (저위험)</button>
        </div>

        <!-- ── 2-2. AI 챗봇 박스 ──
             자동 인사이트: 버튼 클릭 시 자동으로 표시
             수동 질문: 입력창에 입력 후 전송 -->
        <div class="chatbot-box">
            <div class="chatbot-title">🤖 AI 인사이트 챗봇 (Gemini)</div>
            <div class="chat-messages" id="chatMessages">
                <span class="chat-msg-auto">데이터 로딩 중...</span>
            </div>
            <div class="chat-input-row">
                <input  class="chat-input" id="chatInput"
                        type="text" placeholder="그래프에 대해 질문하세요...">
                <button class="chat-send" id="chatSendBtn">전송</button>
            </div>
        </div>

    </div><!-- /control-bar -->


    <!-- =========================================================
         📌 3. 그래프 6개 (가설 1~6)
         그래프 추가 → <div class="chart-card"> 블록 복사해서 붙이기
         그래프 종류 변경 → JS 구역 drawChart번호() 함수에서 type 변경
         ========================================================= -->
    <div class="charts-grid" id="chartsGrid">

        <!-- 가설 1 -->
        <div class="chart-card" id="card1">
            <div class="chart-card-title">
                🟦 가설1 &nbsp;|&nbsp; 상담전화건수 vs 해지건수
            </div>
            <div class="chart-wrap">
                <canvas id="chart1"></canvas>
            </div>
        </div>

        <!-- 가설 2 -->
        <div class="chart-card" id="card2">
            <div class="chart-card-title">
                🟩 가설2 &nbsp;|&nbsp; 가입일 구간 vs 해지율
            </div>
            <div class="chart-wrap">
                <canvas id="chart2"></canvas>
            </div>
        </div>

        <!-- 가설 3 -->
        <div class="chart-card" id="card3">
            <div class="chart-card-title">
                🟨 가설3 &nbsp;|&nbsp; 총통화시간 구간 vs 해지율
            </div>
            <div class="chart-wrap">
                <canvas id="chart3"></canvas>
            </div>
        </div>

        <!-- 가설 4 -->
        <div class="chart-card" id="card4">
            <div class="chart-card-title">
                🟥 가설4 &nbsp;|&nbsp; 시간대별 통화비율 (해지 vs 유지)
            </div>
            <div class="chart-wrap">
                <canvas id="chart4"></canvas>
            </div>
        </div>

        <!-- 가설 5 -->
        <div class="chart-card" id="card5">
            <div class="chart-card-title">
                🟪 가설5 &nbsp;|&nbsp; 상담강도 구간 vs 해지율
            </div>
            <div class="chart-wrap">
                <canvas id="chart5"></canvas>
            </div>
        </div>

        <!-- 가설 6 -->
        <div class="chart-card" id="card6">
            <div class="chart-card-title">
                ⬛ 가설6 &nbsp;|&nbsp; 시간당 요금 구간 vs 해지율
            </div>
            <div class="chart-wrap">
                <canvas id="chart6"></canvas>
            </div>
        </div>

    </div><!-- /charts-grid -->


    <!-- =========================================================
         📌 4. 고위험 고객 테이블
         ========================================================= -->
    <div class="table-section">
        <div class="table-section-title">🚨 고위험 고객 Top 100</div>
        <table class="risk-table">
            <thead>
                <tr>
                    <th>순위</th>
                    <th>고객 ID</th>
                    <th>위험점수</th>
                    <th>등급</th>
                    <th>상담전화건수</th>
                    <th>가입일</th>
                    <th>실제 해지여부</th>
                </tr>
            </thead>
            <tbody id="riskTableBody">
                <tr><td colspan="7" style="text-align:center; color:#6b7280;">
                    데이터 로딩 중...
                </td></tr>
            </tbody>
        </table>
    </div>


    <!-- =========================================================
         📌 5. JavaScript 구역
         ============================================================
         ┌─────────────────────────────────────────────────────────┐
         │  구역 목록                                               │
         │  5-1. 전역 변수                                          │
         │  5-2. 색상 설정                                          │
         │  5-3. 페이지 로드 시 자동 실행                           │
         │  5-4. 버튼 클릭 이벤트                                   │
         │                                                          │
         │  ★★★ 비동기(AJAX) 구역 ★★★                              │
         │  5-5. loadData()      → Flask /get_all_data 호출        │
         │  5-6. loadTable()     → Flask /high_risk_customers 호출 │
         │  5-7. sendChat()      → Flask /chat_insight 호출        │
         │                                                          │
         │  5-8. 차트 그리는 함수 6개 (drawChart1 ~ drawChart6)    │
         │  5-9. 챗봇 자동 인사이트 표시 함수                       │
         └─────────────────────────────────────────────────────────┘
         ========================================================= -->
    <script>

    /* =========================================================
       5-1. 전역 변수
       - charts    : 차트 객체 저장 (업데이트 시 기존 차트 삭제 용도)
       - graphData : 현재 그래프에 표시된 데이터 저장 (챗봇이 사용)
       - nowGrade  : 현재 선택된 등급 (ALL / A / B / C / D)
       ========================================================= */
    let charts    = {};   // { chart1: Chart객체, chart2: Chart객체, ... }
    let graphData = null; // Flask에서 받아온 전체 데이터
    let nowGrade  = 'ALL';


    /* =========================================================
       5-2. 색상 설정
       등급별 색상 → CSS 변수랑 맞춰서 여기도 수정
       ========================================================= */
    const COLOR = {
        ALL: '#6366f1',
        A:   '#ef4444',
        B:   '#f97316',
        C:   '#eab308',
        D:   '#22c55e',
    };

    /* 차트 기본 색상 (막대/라인 기본값) */
    const CHART_DEFAULTS = {
        borderWidth:     2,
        borderRadius:    6,
        tension:         0.4,  // 라인차트 곡선 정도
        pointRadius:     5,
    };


    /* =========================================================
       5-3. 페이지 로드 시 자동 실행
       ========================================================= */
    window.addEventListener('load', () => {
        loadData('ALL');   // 그래프 데이터 로드
        loadTable();       // 테이블 데이터 로드
    });


    /* =========================================================
       5-4. 버튼 클릭 이벤트
       버튼에 있는 data-grade 값을 읽어서 loadData() 호출
       ========================================================= */
    document.querySelectorAll('.grade-btn').forEach(btn => {
        btn.addEventListener('click', function () {

            // 모든 버튼에서 active 제거 → 클릭한 버튼만 active
            document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const grade = this.dataset.grade;  // "A" / "B" / "C" / "D" / "ALL"
            nowGrade = grade;

            // ★ 여기서 비동기 요청 시작 ★
            loadData(grade);
        });
    });


    /* =========================================================
       ★★★ 5-5. 비동기 함수 : loadData(grade) ★★★
       ─────────────────────────────────────────────────────────
       역할   : Flask /get_all_data 에 등급(grade)을 보내고
                6개 가설 데이터를 받아서 차트를 그림
       흐름   :
           버튼 클릭
             → fetch("/get_all_data", { grade: "A" })  ← 요청 보냄
             → Flask get_all_data() 실행
             → Flask에서 JSON 반환
             → data = { h1:{...}, h2:{...}, ... }       ← 받음
             → drawChart1(data.h1) ... drawChart6(data.h6) 호출
       ========================================================= */
    async function loadData(grade) {

        // 로딩 표시 (원하면 스피너 등으로 교체)
        document.querySelectorAll('.chart-card').forEach(c => c.classList.remove('highlight'));

        try {
            /* ── ★ 비동기 요청 (AJAX) 시작 ──
               fetch() = 브라우저가 Flask에 요청을 보내는 함수
               method: "POST"           → 데이터를 보내는 방식
               headers: Content-Type    → "JSON 형식으로 보낼게" 선언
               body: JSON.stringify({}) → 실제로 보내는 데이터
            */
            const res = await fetch('/get_all_data', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ grade: grade })
            });
            /* ── ★ 비동기 응답 받음 ──
               res.json() → Flask가 jsonify()로 보낸 JSON을 파싱
            */
            const data = await res.json();
            graphData = data;  // 챗봇이 나중에 쓸 수 있게 저장

            // ── 6개 차트 그리기 ──
            drawChart1(data.h1);
            drawChart2(data.h2);
            drawChart3(data.h3);
            drawChart4(data.h4);
            drawChart5(data.h5);
            drawChart6(data.h6);

            // ── 카드 하이라이트 효과 ──
            if (grade !== 'ALL') {
                document.querySelectorAll('.chart-card').forEach(c => {
                    c.classList.add('highlight');
                    c.style.borderColor = COLOR[grade];
                });
                setTimeout(() => {
                    document.querySelectorAll('.chart-card').forEach(c => {
                        c.classList.remove('highlight');
                        c.style.borderColor = '';
                    });
                }, 1200);
            }

            // ── 챗봇 자동 인사이트 요청 ──
            autoInsight(data);

        } catch (err) {
            console.error('loadData 오류:', err);
        }
    }


    /* =========================================================
       ★★★ 5-6. 비동기 함수 : loadTable() ★★★
       ─────────────────────────────────────────────────────────
       역할   : Flask /high_risk_customers 에서 Top100 받아서 테이블 렌더
       ========================================================= */
    async function loadTable() {
        try {
            /* ── ★ 비동기 요청 ── */
            const res  = await fetch('/high_risk_customers', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const rows = await res.json();
            /* ── ★ 비동기 응답 받음 ── */

            const tbody = document.getElementById('riskTableBody');

            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">데이터 없음</td></tr>';
                return;
            }

            // 테이블 행 생성
            tbody.innerHTML = rows.map(r => `
                <tr>
                    <td>${r.순위}</td>
                    <td>${r.ID}</td>
                    <td><strong>${r.위험점수}</strong></td>
                    <td><span class="badge badge-${r.RISK_GRADE}">${r.RISK_GRADE}</span></td>
                    <td>${r.상담전화건수}</td>
                    <td>${r.가입일}일</td>
                    <td>${r.전화해지여부 === 1
                        ? '<span style="color:#ef4444">✓ 해지</span>'
                        : '<span style="color:#22c55e">○ 유지</span>'
                    }</td>
                </tr>
            `).join('');

        } catch (err) {
            console.error('loadTable 오류:', err);
        }
    }


    /* =========================================================
       ★★★ 5-7. 비동기 함수 : sendChat() / autoInsight() ★★★
       ─────────────────────────────────────────────────────────
       역할   : Flask /chat_insight 에 질문 + 현재 그래프 데이터를 보내고
                Gemini 답변을 챗봇 창에 표시
       ========================================================= */
    async function autoInsight(data) {
        const box = document.getElementById('chatMessages');
        box.innerHTML = '<span class="chat-msg-auto">🤖 분석 중...</span>';

        try {
            /* ── ★ 비동기 요청 ── */
            const res    = await fetch('/chat_insight', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ auto_mode: true, graph_data: data })
            });
            const result = await res.json();
            /* ── ★ 비동기 응답 받음 ── */

            box.innerHTML = `<span class="chat-msg-auto">${result.answer}</span>`;
        } catch (err) {
            box.innerHTML = '<span style="color:#ef4444">챗봇 오류</span>';
        }
    }

    async function sendChat() {
        const input = document.getElementById('chatInput');
        const msg   = input.value.trim();
        if (!msg) return;

        const box = document.getElementById('chatMessages');
        box.innerHTML += `<div class="chat-msg-user">👤 ${msg}</div>`;
        box.innerHTML += `<div class="chat-msg-bot">🤖 답변 중...</div>`;
        box.scrollTop = box.scrollHeight;
        input.value   = '';

        try {
            /* ── ★ 비동기 요청 ── */
            const res    = await fetch('/chat_insight', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    auto_mode:  false,
                    message:    msg,
                    graph_data: graphData
                })
            });
            const result = await res.json();
            /* ── ★ 비동기 응답 받음 ── */

            // 마지막 "답변 중..." 제거 후 실제 답변 추가
            const last = box.querySelector('.chat-msg-bot:last-child');
            if (last) last.textContent = '🤖 ' + result.answer;

        } catch (err) {
            console.error('sendChat 오류:', err);
        }

        box.scrollTop = box.scrollHeight;
    }

    // 전송 버튼 + Enter 키 모두 sendChat() 호출
    document.getElementById('chatSendBtn').addEventListener('click', sendChat);
    document.getElementById('chatInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') sendChat();
    });


    /* =========================================================
       5-8. 차트 그리는 함수 6개
       ─────────────────────────────────────────────────────────
       수정 포인트:
         - 차트 종류 바꾸기  → type: 'bar' / 'line' / 'radar' / 'pie'
         - 색상 바꾸기       → backgroundColor, borderColor
         - 제목 바꾸기       → chart-card-title (HTML 구역)
       ========================================================= */

    /* 공통: 차트 인스턴스 교체 함수 */
    function makeChart(id, config) {
        if (charts[id]) charts[id].destroy();           // 기존 차트 삭제
        charts[id] = new Chart(
            document.getElementById(id).getContext('2d'),
            config
        );
    }

    /* 공통 옵션 */
    function baseOpts(yLabel) {
        return {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 700, easing: 'easeInOutQuart' },
            plugins: {
                legend: { labels: { color: '#e8eaf0' } }
            },
            scales: {
                x: { ticks: { color: '#9ca3af' }, grid: { color: '#2a2d3e' } },
                y: {
                    ticks: { color: '#9ca3af' },
                    grid:  { color: '#2a2d3e' },
                    title: { display: true, text: yLabel, color: '#6b7280' },
                    beginAtZero: true
                }
            }
        };
    }

    /* ─── 가설1: 막대그래프 (상담전화건수 vs 해지건수) ───
       Y축: 해지건수 (율 아님!)
       수정: type을 'line' 으로 바꾸면 라인차트로 변경 */
    function drawChart1(h) {
        makeChart('chart1', {
            type: 'bar',                          /* ← 차트 종류 */
            data: {
                labels:   h.labels,              /* X축: 0,1,2...11 */
                datasets: [{
                    label:           '해지건수',
                    data:            h.values,    /* Y축: 해지건수 */
                    backgroundColor: COLOR[nowGrade] + 'bb',
                    borderColor:     COLOR[nowGrade],
                    borderWidth:     CHART_DEFAULTS.borderWidth,
                    borderRadius:    CHART_DEFAULTS.borderRadius,
                }]
            },
            options: baseOpts(h.y_label)
        });
    }

    /* ─── 가설2: 라인차트 (가입일 구간 vs 해지율) ─── */
    function drawChart2(h) {
        makeChart('chart2', {
            type: 'line',                         /* ← 차트 종류 */
            data: {
                labels:   h.labels,
                datasets: [{
                    label:           '해지율(%)',
                    data:            h.values,
                    backgroundColor: COLOR[nowGrade] + '33',
                    borderColor:     COLOR[nowGrade],
                    borderWidth:     CHART_DEFAULTS.borderWidth,
                    tension:         CHART_DEFAULTS.tension,
                    pointRadius:     CHART_DEFAULTS.pointRadius,
                    fill:            true,
                }]
            },
            options: baseOpts(h.y_label)
        });
    }

    /* ─── 가설3: 막대그래프 (총통화시간 구간 vs 해지율) ─── */
    function drawChart3(h) {
        makeChart('chart3', {
            type: 'bar',
            data: {
                labels:   h.labels,
                datasets: [{
                    label:           '해지율(%)',
                    data:            h.values,
                    backgroundColor: COLOR[nowGrade] + 'bb',
                    borderColor:     COLOR[nowGrade],
                    borderWidth:     CHART_DEFAULTS.borderWidth,
                    borderRadius:    CHART_DEFAULTS.borderRadius,
                }]
            },
            options: baseOpts(h.y_label)
        });
    }

    /* ─── 가설4: 레이더차트 (시간대별 비율, 해지 vs 유지) ─── */
    function drawChart4(h) {
        if (charts['chart4']) charts['chart4'].destroy();
        charts['chart4'] = new Chart(
            document.getElementById('chart4').getContext('2d'), {
            type: 'radar',                        /* ← 레이더차트 */
            data: {
                labels:   h.labels,               /* 주간, 저녁, 밤 */
                datasets: [
                    {
                        label:           '해지 고객',
                        data:            h.churn,
                        backgroundColor: 'rgba(239,68,68,0.25)',
                        borderColor:     '#ef4444',
                        borderWidth:     2,
                        pointRadius:     4,
                    },
                    {
                        label:           '유지 고객',
                        data:            h.retain,
                        backgroundColor: 'rgba(34,197,94,0.25)',
                        borderColor:     '#22c55e',
                        borderWidth:     2,
                        pointRadius:     4,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 700 },
                plugins: { legend: { labels: { color: '#e8eaf0' } } },
                scales: {
                    r: {
                        ticks:    { color: '#9ca3af', backdropColor: 'transparent' },
                        grid:     { color: '#2a2d3e' },
                        angleLines:{ color: '#2a2d3e' },
                        pointLabels:{ color: '#e8eaf0' },
                        beginAtZero: true
                    }
                }
            }
        });
    }

    /* ─── 가설5: 막대그래프 (상담강도 구간 vs 해지율) ─── */
    function drawChart5(h) {
        makeChart('chart5', {
            type: 'bar',
            data: {
                labels:   h.labels,
                datasets: [{
                    label:           '해지율(%)',
                    data:            h.values,
                    backgroundColor: COLOR[nowGrade] + 'bb',
                    borderColor:     COLOR[nowGrade],
                    borderWidth:     CHART_DEFAULTS.borderWidth,
                    borderRadius:    CHART_DEFAULTS.borderRadius,
                }]
            },
            options: baseOpts(h.y_label)
        });
    }

    /* ─── 가설6: 막대그래프 (시간당 요금 구간 vs 해지율) ─── */
    function drawChart6(h) {
        makeChart('chart6', {
            type: 'bar',
            data: {
                labels:   h.labels,
                datasets: [{
                    label:           '해지율(%)',
                    data:            h.values,
                    backgroundColor: COLOR[nowGrade] + 'bb',
                    borderColor:     COLOR[nowGrade],
                    borderWidth:     CHART_DEFAULTS.borderWidth,
                    borderRadius:    CHART_DEFAULTS.borderRadius,
                }]
            },
            options: baseOpts(h.y_label)
        });
    }

    </script>
</body>

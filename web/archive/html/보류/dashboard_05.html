<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>통신 고객 이탈 예측 대시보드</title>

<!-- =====================================================
  외부 라이브러리 로드
  - Chart.js : 차트 그리는 라이브러리 (bar, line, doughnut 등)
  - Noto Sans KR : 한글 폰트
  순서 중요: Chart.js가 폰트보다 먼저 로드돼야 함
===================================================== -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>

<style>
/* =====================================================
  [1] CSS 변수 (색상/테마 커스텀은 여기서만 수정)
  --bg        : 전체 배경색
  --surface   : 카드/패널 배경색
  --surface2  : 버튼 등 보조 배경색
  --border    : 테두리 색
  --text      : 기본 글자색
  --muted     : 흐린 글자색 (부제목, 라벨 등)
  --all~--d   : 등급별 포인트 색상
===================================================== */
:root {
  --bg:       #06080f;
  --surface:  #0c1020;
  --surface2: #111827;
  --border:   #1a2035;
  --text:     #e2e8f0;
  --muted:    #4e627a;
  --all:      #6366f1;   /* 전체 (보라) */
  --a:        #ef4444;   /* A등급 (빨강) */
  --b:        #f97316;   /* B등급 (주황) */
  --c:        #eab308;   /* C등급 (노랑) */
  --d:        #22c55e;   /* D등급 (초록) */
}

/* =====================================================
  [2] 전체 초기화 & 기본 설정
  * 선택자 : HTML 모든 요소에 적용
===================================================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box; /* padding이 width 안쪽으로 들어오게 */
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* =====================================================
  [3] HEADER — 최상단 고정 헤더
  position:sticky + top:0 → 스크롤해도 상단에 고정
  z-index:100 → 다른 요소 위에 표시
===================================================== */
header {
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  background: linear-gradient(135deg, #0c1020, #06080f);
  position: sticky;
  top: 0;
  z-index: 100;
}
header h1 { font-size: 1.3rem; font-weight: 900; letter-spacing: -.5px; }
header p  { font-size: .73rem; color: var(--muted); margin-top: 2px; }

.header-badge {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: 1px;
  margin-left: auto; /* 오른쪽 끝으로 밀기 */
}

/* =====================================================
  [4] MAIN WRAPPER — 페이지 본문 전체 감싸는 컨테이너
  max-width로 너무 넓어지는 것 방지
  margin:0 auto → 가운데 정렬
===================================================== */
.wrapper {
  padding: 24px 40px;
  max-width: 1440px;
  margin: 0 auto;
}

/* =====================================================
  [5] SECTION: 위험 등급 필터
  등급 버튼들을 묶는 영역
===================================================== */
.grade-section { margin-bottom: 18px; }

.section-label {
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* 버튼들 가로 나열 */
.grade-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap; /* 화면 좁으면 줄바꿈 */
}

/* 등급 버튼 공통 스타일 */
.grade-btn {
  padding: 10px 24px;
  border: 2px solid transparent;
  border-radius: 50px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: .88rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .22s ease;
  color: #fff;
}
/* 등급별 버튼 색상 */
.btn-all { background: var(--all); }
.btn-a   { background: var(--a); }
.btn-b   { background: var(--b); }
.btn-c   { background: var(--c); color: #111; } /* 노랑은 배경이 밝아서 글자 검게 */
.btn-d   { background: var(--d); color: #111; } /* 초록도 동일 */

.grade-btn:hover  { transform: translateY(-2px); filter: brightness(1.18); }
.grade-btn.active { transform: scale(1.1); box-shadow: 0 0 22px rgba(255,255,255,.2); border-color: #fff; }

/* 등급 선택 시 나타나는 설명 바 (기본 숨김) */
.grade-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 11px 18px;
  margin-bottom: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: .82rem;
}
.grade-bar.show { display: flex; } /* JS에서 .show 추가하면 보임 */

.grade-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* =====================================================
  [6] SECTION: AI 챗봇 어드바이저
===================================================== */
.chatbot-section { margin-bottom: 26px; }

.chatbot-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 22px 26px;
}

/* 챗봇 카드 상단 타이틀 영역 */
.chatbot-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 13px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.ai-badge {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff;
  font-size: .68rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 1px;
}
.chatbot-header h2 { font-size: .95rem; font-weight: 700; }
.powered { font-size: .72rem; color: var(--muted); margin-left: auto; }

/* 가설 버튼 그룹 */
.ai-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.ai-btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface2);
  color: var(--text);
  font-size: .78rem;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.ai-btn:hover          { border-color: var(--all); color: var(--all); }
.ai-btn.primary        { background: linear-gradient(135deg, #6366f1, #8b5cf6); border-color: transparent; color: #fff; }
.ai-btn.primary:hover  { filter: brightness(1.15); }

/* 대화 메시지 출력 영역 */
.chat-messages {
  min-height: 80px;
  max-height: 210px;
  overflow-y: auto;       /* 내용 넘치면 스크롤 */
  padding: 13px;
  background: var(--bg);
  border-radius: 10px;
  margin-bottom: 12px;
  font-size: .83rem;
  line-height: 1.85;
  white-space: pre-wrap;  /* 줄바꿈 그대로 표시 */
}
/* 스크롤바 커스텀 */
.chat-messages::-webkit-scrollbar       { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* 메시지 종류별 색상 */
.msg-auto    { color: #a5b4fc; }                             /* AI 자동 분석 */
.msg-user    { color: #fbbf24; margin-top: 10px; font-weight: 600; } /* 사용자 입력 */
.msg-bot     { color: var(--text); }                         /* AI 답변 */
.msg-loading { color: var(--muted); font-style: italic; }    /* 로딩 중 */

/* 입력창 + 전송 버튼 한 줄 */
.chat-input-row { display: flex; gap: 8px; }

.chat-input {
  flex: 1;
  padding: 10px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 50px;
  color: var(--text);
  font-size: .83rem;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color .2s;
}
.chat-input:focus { border-color: var(--all); }

.chat-send {
  padding: 10px 22px;
  background: var(--all);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-weight: 700;
  font-size: .83rem;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: filter .2s;
}
.chat-send:hover { filter: brightness(1.2); }

/* =====================================================
  [7] SECTION: 차트 그리드
  2열 × 3행 레이아웃
  ★ 차트 개수 바꾸려면 grid-template-columns 수정
    예) 3열로 바꾸기 → repeat(3, 1fr)
===================================================== */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 2열 고정 */
  gap: 24px;
  margin-bottom: 32px;
}
/* 모바일: 900px 이하에서 1열로 변경 */
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
}

/* =====================================================
  [8] ARTICLE: 개별 차트 카드
  ★ 차트 카드 디자인 바꾸려면 여기 수정
===================================================== */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  overflow: visible;
  position: relative;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1), border-color .3s, box-shadow .4s;
}
/* 마우스 올렸을 때 위로 떠오르는 효과 */
.chart-card:hover {
  transform: translateY(-8px) scale(1.012);
  box-shadow: 0 20px 50px rgba(99,102,241,.28), 0 0 0 1px rgba(99,102,241,.4);
  border-color: rgba(99,102,241,.55);
}
/* 등급 변경 시 잠깐 커졌다 돌아오는 팝 애니메이션 */
.chart-card.pop { transform: scale(1.055); }

/* 카드 상단: 제목 + 설명 버튼 */
.chart-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.card-left       { display: flex; align-items: center; gap: 8px; }
.chart-emoji     { font-size: 1.1rem; }
.chart-title     { font-size: .83rem; font-weight: 700; color: var(--muted); }

.explain-btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: transparent;
  color: var(--muted);
  font-size: .73rem;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.explain-btn:hover { border-color: var(--all); color: var(--all); }

/* =====================================================
  [9] 차트 캔버스 감싸는 래퍼
  ★ 차트 높이 바꾸려면 height 값 수정
===================================================== */
.chart-wrap {
  position: relative;
  height: 340px; /* ← 여기서 차트 높이 조절 */
}
</style>
</head>
<body>

<!-- =====================================================
  [HTML 구조 전체 개요]

  <header>          최상단 고정 헤더
  <main>            페이지 핵심 본문 (딱 하나만 씀)
    <section>       위험 등급 필터 영역
    <div>           등급 설명 바 (레이아웃 전용)
    <section>       AI 챗봇 어드바이저 영역
    <section>       차트 6개 그리드 영역
      <article>     개별 차트 카드 × 6
===================================================== -->


<!-- ==============================
  HEADER: 페이지 제목 + 뱃지
============================== -->
<header>
  <div style="font-size:1.5rem" aria-hidden="true">📡</div>
  <div>
    <h1>통신 고객 이탈 예측 대시보드</h1>
    <p>Customer Churn Prediction · 데이터 기반 이탈 예측 시스템</p>
  </div>
  <span class="header-badge">✦ GROQ</span>
</header>


<!-- ==============================
  MAIN: 페이지 핵심 본문
============================== -->
<main class="wrapper">


  <!-- ============================================================
    SECTION 1: 위험 등급 필터
    역할: 등급 버튼 클릭 → 차트 데이터 필터링
    수정 포인트:
      - 버튼 추가/삭제 → .grade-btns 안에 <button> 추가
      - 버튼 색상 → CSS [5]번 .btn-* 수정
      - 클릭 동작 → JS [C]번 grade-btn 이벤트 리스너
  ============================================================ -->
  <section class="grade-section" aria-label="위험 등급 필터">

    <p class="section-label">▸ 위험 등급 필터</p>

    <div class="grade-btns" role="group" aria-label="등급 선택">
      <button class="grade-btn btn-all active" data-grade="ALL">전체 보기</button>
      <button class="grade-btn btn-a"          data-grade="A">🔴 A등급 — 최고위험</button>
      <button class="grade-btn btn-b"          data-grade="B">🟠 B등급 — 고위험</button>
      <button class="grade-btn btn-c"          data-grade="C">🟡 C등급 — 중위험</button>
      <button class="grade-btn btn-d"          data-grade="D">🟢 D등급 — 저위험</button>
    </div>

  </section>

  <!-- 등급 선택 시 나타나는 설명 바 (ALL이면 숨김) -->
  <!-- 레이아웃 전용이라 div 사용 -->
  <div class="grade-bar" id="gradeBar" role="status" aria-live="polite">
    <div class="grade-dot" id="gradeDot"></div>
    <span id="gradeText"></span>
  </div>


  <!-- ============================================================
    SECTION 2: AI 챗봇 어드바이저
    역할: Groq API 호출 → 그래프 데이터 기반 AI 분석 결과 표시
    수정 포인트:
      - 가설 버튼 추가 → .ai-btns 안에 <button> 추가 후
        onclick="explainHypothesis(숫자)" 연결
      - 자동 분석 로직 → JS [D-2]번 autoInsight()
      - 가설 분석 로직 → JS [D-3]번 explainHypothesis()
      - 사용자 질문 로직 → JS [D-4]번 sendChat()
  ============================================================ -->
  <section class="chatbot-section" aria-label="AI 어드바이저">

    <div class="chatbot-card">

      <!-- 챗봇 카드 헤더 -->
      <header class="chatbot-header">
        <span class="ai-badge">AI ADVISOR</span>
        <h2>이탈 예측 인사이트</h2>
        <span class="powered">Powered by Groq Pro</span>
      </header>

      <!-- 빠른 분석 버튼들 -->
      <div class="ai-btns" role="group" aria-label="빠른 분석">
        <button class="ai-btn primary" id="analyzeBtn">📊 종합 분석</button>
        <button class="ai-btn" onclick="explainHypothesis(1)">📘 가설1</button>
        <button class="ai-btn" onclick="explainHypothesis(2)">📘 가설2</button>
        <button class="ai-btn" onclick="explainHypothesis(3)">📘 가설3</button>
        <button class="ai-btn" onclick="explainHypothesis(4)">📘 가설4</button>
        <button class="ai-btn" onclick="explainHypothesis(5)">📘 가설5</button>
        <button class="ai-btn" onclick="explainHypothesis(6)">📘 가설6</button>
      </div>

      <!-- AI 메시지 출력 영역 -->
      <div class="chat-messages" id="chatMessages" aria-live="polite">
        <span class="msg-loading">데이터 로딩 중...</span>
      </div>

      <!-- 사용자 입력창 -->
      <div class="chat-input-row">
        <input
          id="chatInput"
          class="chat-input"
          type="text"
          placeholder="예: A등급 고객의 주요 이탈 원인은 무엇인가요?"
          aria-label="질문 입력"
        />
        <button id="chatSendBtn" class="chat-send">전송</button>
      </div>

    </div>
  </section>


  <!-- ============================================================
    SECTION 3: 차트 그리드 (가설 6개)
    역할: 6개 차트를 2열 × 3행으로 배치
    수정 포인트:
      - 차트 추가/삭제 → <article class="chart-card"> 블록 복사
      - 차트 타입/데이터 → JS [E]번 drawChart*() 함수들
      - 그리드 열 수 → CSS [7]번 grid-template-columns
      - 차트 높이 → CSS [9]번 .chart-wrap height
  ============================================================ -->
  <section class="charts-grid" id="chartsGrid" aria-label="가설별 차트">


    <!-- ——————————————————————————————
      ARTICLE: 가설1 차트 카드
      차트 타입: 세로 막대 (bar)
      내용: 상담전화건수 vs 해지건수
      수정: JS drawChart1() 함수
    —————————————————————————————— -->
    <article class="chart-card" id="card1">
      <div class="chart-card-head">
        <div class="card-left">
          <span class="chart-emoji" aria-hidden="true">🟦</span>
          <span class="chart-title">가설1 · 상담전화건수 vs 해지건수</span>
        </div>
        <button class="explain-btn" onclick="explainHypothesis(1)">📘 설명</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart1" aria-label="가설1 차트"></canvas>
      </div>
    </article>


    <!-- ——————————————————————————————
      ARTICLE: 가설2 차트 카드
      차트 타입: 꺾은선 (line)
      내용: 가입일 구간 vs 해지율
      수정: JS drawChart2() 함수
    —————————————————————————————— -->
    <article class="chart-card" id="card2">
      <div class="chart-card-head">
        <div class="card-left">
          <span class="chart-emoji" aria-hidden="true">🟩</span>
          <span class="chart-title">가설2 · 가입일 구간 vs 해지율</span>
        </div>
        <button class="explain-btn" onclick="explainHypothesis(2)">📘 설명</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart2" aria-label="가설2 차트"></canvas>
      </div>
    </article>


    <!-- ——————————————————————————————
      ARTICLE: 가설3 차트 카드
      차트 타입: 도넛 (doughnut)
      내용: 총통화시간 vs 해지율
      수정: JS drawChart3() 함수
    —————————————————————————————— -->
    <article class="chart-card" id="card3">
      <div class="chart-card-head">
        <div class="card-left">
          <span class="chart-emoji" aria-hidden="true">🟨</span>
          <span class="chart-title">가설3 · 총통화시간 vs 해지율</span>
        </div>
        <button class="explain-btn" onclick="explainHypothesis(3)">📘 설명</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart3" aria-label="가설3 차트"></canvas>
      </div>
    </article>


    <!-- ——————————————————————————————
      ARTICLE: 가설4 차트 카드
      차트 타입: 레이더 (radar)
      내용: 시간대별 통화비율 해지 vs 유지
      수정: JS drawChart4() 함수
    —————————————————————————————— -->
    <article class="chart-card" id="card4">
      <div class="chart-card-head">
        <div class="card-left">
          <span class="chart-emoji" aria-hidden="true">🟥</span>
          <span class="chart-title">가설4 · 시간대별 통화비율 해지 vs 유지</span>
        </div>
        <button class="explain-btn" onclick="explainHypothesis(4)">📘 설명</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart4" aria-label="가설4 차트"></canvas>
      </div>
    </article>


    <!-- ——————————————————————————————
      ARTICLE: 가설5 차트 카드
      차트 타입: 수평 막대 (bar, indexAxis:'y')
      내용: 상담강도 vs 해지율

    —————————————————————————————— -->
    <article class="chart-card" id="card5">

        <div class="card-left">
          <span class="chart-emoji" aria-hidden="true">🟪</span>
          <span class="chart-title">가설5 · 상담강도 vs 해지율</span>
        </div>
        <button class="explain-btn" onclick="explainHypothesis(5)">📘 설명</button>
      </div>
      <div class="chart-wrap">
        <canvas id="chart5" aria-label="가설5 차트"></canvas>

    <!-- ——————————————————————————————
      ARTICLE: 가설6 차트 카드
      차트 타입: 버블 (bubble)
      내용: 시간당요금 vs 해지율
      수정: JS drawChart6() 함수
    —————————————————————————————— -->
    <article class="chart-card" id="card6">
      <div class="chart-card-head">
        <div class="card-left">
          <span class="chart-emoji" aria-hidden="true">⬛</span>
          <span class="chart-title">가설6 · 시간당요금 vs 해지율 (버블)</span>
        </div>
        <button class="explain-btn" onclick="explainHypothesis(6)">📘 설명</button>

<!-- =====================================================
  JAVASCRIPT
  구조:
    [A] 전역 변수/상수
    [B] 페이지 로드 초기화
    [C] 버튼 이벤트 등록
    [D] API 통신 함수
      D-1. loadData()        서버에서 차트 데이터 가져오기
      D-2. autoInsight()     AI 종합 분석 요청
      D-3. explainHypothesis() 개별 가설 분석 요청
      D-4. sendChat()        사용자 질문 전송
    [E] 차트 그리기 함수
      E-0. 공통 유틸 (makeChart, xyScale, makeBarHighlightPlugin)
      E-1. drawChart1()  가설1: 세로 막대
      E-2. drawChart2()  가설2: 꺾은선
      E-3. drawChart3()  가설3: 도넛
      E-4. drawChart4()  가설4: 레이더
      E-5. drawChart5()  가설5: 수평 막대
      E-6. drawChart6()  가설6: 버블
    [F] UI 애니메이션
      popCards()         등급 변경 시 카드 팝 효과
===================================================== -->
<script>

/* =====================================================
  [A] 전역 변수 / 상수
  ★ 등급 색상 바꾸려면 GRADE_COLOR 수정
  ★ 등급 설명 바꾸려면 GRADE_MSG 수정
===================================================== */

let charts   = {};         // 생성된 Chart 인스턴스 보관 { chart1: ..., chart2: ... }
let lastData = null;       // 마지막으로 서버에서 받은 데이터 (AI 분석에 재사용)
let nowGrade = 'ALL';      // 현재 선택된 등급

// 등급별 포인트 색상
const GRADE_COLOR = {
  ALL: '#6366f1',
  A:   '#ef4444',
  B:   '#f97316',
  C:   '#eab308',
  D:   '#22c55e',
};

// 등급 바 설명 텍스트
const GRADE_MSG = {
  ALL: '전체 고객 데이터를 표시합니다.',
  A:   '🔴 A등급(최고위험): 상담전화 多·신규가입·낮은통화량 구간이 강조됩니다.',
  B:   '🟠 B등급(고위험): 고위험 특성 구간이 강조됩니다.',
  C:   '🟡 C등급(중위험): 중위험 구간이 강조됩니다.',
  D:   '🟢 D등급(저위험): 저위험·충성고객 구간이 강조됩니다.',
};

// 차트 공통 색상 (다크 테마용)
const DARK = {
  color: '#4e627a',  // 제목 색
  grid:  '#1a2035',  // 격자선 색
  tick:  '#7a92aa',  // 축 라벨 색
};


/* =====================================================
  [B] 페이지 로드 초기화
  페이지 열리면 전체(ALL) 데이터 자동 로드
===================================================== */
window.addEventListener('load', () => {
  loadData('ALL');
});


/* =====================================================
  [C] 버튼 이벤트 등록
  - 등급 버튼: 클릭 시 등급 바 업데이트 + 데이터 새로 로드
  - 종합 분석 버튼: AI 분석 요청
===================================================== */

// 등급 버튼 (전체/A/B/C/D)
document.querySelectorAll('.grade-btn').forEach(btn => {
  btn.addEventListener('click', function() {

    // 모든 버튼에서 active 제거 → 클릭한 버튼에만 active 추가
    document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');

    nowGrade = this.dataset.grade; // data-grade 속성값 읽기

    // 등급 설명 바 업데이트
    const bar = document.getElementById('gradeBar');
    document.getElementById('gradeDot').style.background = GRADE_COLOR[nowGrade];
    document.getElementById('gradeText').textContent = GRADE_MSG[nowGrade];

    // ALL이면 설명 바 숨기기, 아니면 보이기
    nowGrade === 'ALL' ? bar.classList.remove('show') : bar.classList.add('show');

    // 새 등급으로 데이터 다시 로드
    loadData(nowGrade);
  });
});

// 종합 분석 버튼
document.getElementById('analyzeBtn').addEventListener('click', () => {
  if (lastData) autoInsight(lastData);
});


/* =====================================================
  [D-1] loadData(grade)
  역할: 서버 /get_all_data 에 등급 전송 → 차트 데이터 수신 → 차트 그리기
  ★ API 엔드포인트 바꾸려면 fetch('/get_all_data') URL 수정
  ★ 서버 응답 구조: { h1, h2, h3, h4, h5, h6 }
===================================================== */
async function loadData(grade) {
  try {
    const res = await fetch('/get_all_data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ grade }),
    });
    const data = await res.json();
    lastData = data;

    // 받은 데이터로 차트 6개 그리기
    drawChart1(data.h1);
    drawChart2(data.h2);
    drawChart3(data.h3);
    drawChart4(data.h4);
    drawChart5(data.h5);
    drawChart6(data.h6);

    // 카드 팝 애니메이션
    popCards(grade);

    // 전체 보기일 때만 자동으로 AI 종합 분석 실행
    if (grade === 'ALL') autoInsight(data);

  } catch (e) {
    console.error('loadData 오류:', e);
  }
}


/* =====================================================
  [D-2] autoInsight(data)
  역할: 서버 /chat_insight 에 전체 데이터 전송 → AI 종합 분석 결과 수신
===================================================== */
async function autoInsight(data) {
  const box = document.getElementById('chatMessages');
  box.innerHTML = '<span class="msg-loading">🤖 AI 종합 분석 중... (수 초 소요)</span>';

  try {
    const res = await fetch('/chat_insight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ auto_mode: true, graph_data: data }),
    });
    const r = await res.json();

    box.innerHTML = r.success
      ? `<span class="msg-auto">${r.answer}</span>`
      : `<span style="color:#ef4444">⚠ ${r.answer}</span>`;

  } catch (e) {
    box.innerHTML = '<span style="color:#ef4444">⚠ AI 서비스 오류</span>';
  }
}


/* =====================================================
  [D-3] explainHypothesis(id)
  역할: 특정 가설 번호(1~6)에 대한 AI 분석 요청
  ★ 가설 버튼 클릭 시 호출됨 (HTML onclick="explainHypothesis(숫자)")
===================================================== */
async function explainHypothesis(id) {
  if (!lastData) { alert('데이터 로딩 중'); return; }

  const box = document.getElementById('chatMessages');
  box.innerHTML = `<span class="msg-loading">🤖 가설${id} 분석 중...</span>`;

  try {
    const res = await fetch('/chat_insight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'hypothesis', hypothesis_id: id, graph_data: lastData }),
    });
    const r = await res.json();

    box.innerHTML = r.success
      ? `<span class="msg-auto">${r.answer}</span>`
      : `<span style="color:#ef4444">⚠ ${r.answer}</span>`;

  } catch (e) {
    box.innerHTML = '<span style="color:#ef4444">⚠ 오류</span>';
  }

  box.scrollTop = box.scrollHeight; // 스크롤 맨 아래로
}


/* =====================================================
  [D-4] sendChat()
  역할: 사용자가 입력한 질문을 서버에 전송 → AI 답변 수신
  호출 조건: 전송 버튼 클릭 or Enter 키
===================================================== */
async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return; // 빈 입력 무시

  const box = document.getElementById('chatMessages');

  // 사용자 메시지 표시
  box.innerHTML += `<div class="msg-user">👤 ${msg}</div>`;
  box.innerHTML += `<div class="msg-loading" id="loadMsg">🤖 답변 생성 중...</div>`;
  box.scrollTop = box.scrollHeight;
  input.value = '';

  try {
    const res = await fetch('/chat_insight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, graph_data: lastData, auto_mode: false }),
    });
    const r = await res.json();

    // 로딩 메시지 제거 후 AI 답변 추가
    const el = document.getElementById('loadMsg');
    if (el) el.remove();
    box.innerHTML += `<div class="msg-bot">🤖 ${r.answer}</div>`;

  } catch (e) {
    box.innerHTML += '<div style="color:#ef4444">⚠ 오류</div>';
  }

  box.scrollTop = box.scrollHeight;
}

// 전송 버튼 클릭
document.getElementById('chatSendBtn').addEventListener('click', sendChat);
// Enter 키로도 전송
document.getElementById('chatInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') sendChat();
});


/* =====================================================
  [E-0] 차트 공통 유틸 함수
===================================================== */

/**
 * makeChart(id, config)
 * 기존 차트가 있으면 destroy() 후 새로 생성
 * ★ Chart.js 설정 전체 구조: https://www.chartjs.org/docs/
 */
function makeChart(id, config) {
  if (charts[id]) charts[id].destroy(); // 기존 차트 제거 (메모리 누수 방지)
  charts[id] = new Chart(document.getElementById(id), config);
}

/**
 * xyScale(yLabel)
 * x/y 축 공통 스타일 반환 (다크 테마)
 * ★ 축 스타일 바꾸려면 여기 수정
 */
function xyScale(yLabel) {
  return {
    x: {
      ticks: { color: DARK.tick },
      grid:  { color: DARK.grid },
    },
    y: {
      ticks: { color: DARK.tick },
      grid:  { color: DARK.grid },
      title: { display: true, text: yLabel, color: DARK.color },
      beginAtZero: true,
    },
  };
}

/**
 * makeBarHighlightPlugin(idxArr, gradeColor, suffix)
 * 등급 필터 시 특정 막대를 강조하는 플러그인
 * Chart.js afterDatasetsDraw 훅: 막대 그린 후 강조 사각형 덮어 그림
 * @param idxArr     강조할 막대 인덱스 배열 (서버 응답의 highlight)
 * @param gradeColor 강조 색상
 * @param suffix     숫자 뒤에 붙는 단위 (예: '건', '%')
 */
function makeBarHighlightPlugin(idxArr, gradeColor, suffix) {
  return {
    id: 'hl_' + Math.random(),
    afterDatasetsDraw(chart) {
      if (!idxArr || !idxArr.length || nowGrade === 'ALL') return;

      const { ctx, data } = chart;

      chart.getDatasetMeta(0).data.forEach((bar, i) => {
        if (!idxArr.includes(i)) return;

        const x      = bar.x;
        const y      = bar.y;
        const w      = bar.width;
        const bottom = chart.scales.y.getPixelForValue(0);
        const GROW   = 9;   // 좌우로 더 넓게
        const LIFT   = 16;  // 위로 더 솟게

        ctx.save();

        // 강조 사각형
        ctx.fillStyle = gradeColor;
        ctx.beginPath();
        ctx.roundRect(x - w/2 - GROW, y - LIFT, w + GROW*2, bottom - y + LIFT, 8);
        ctx.fill();

        // 흰 테두리
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // 값 라벨
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 12px Noto Sans KR, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(data.datasets[0].data[i] + (suffix || ''), x, y - LIFT - 5);

        ctx.restore();
      });
    },
  };
}


/* =====================================================
  [E-1] drawChart1(h) — 가설1: 세로 막대 (bar)
  데이터: h.labels(X축), h.values(막대 높이), h.highlight(강조 인덱스)
  ★ 이 차트만 수정하려면 여기서만 건드리면 됨
===================================================== */
function drawChart1(h) {
  const base = GRADE_COLOR[nowGrade];
  const isGrade = nowGrade !== 'ALL';

  // 강조 인덱스는 진한 색, 나머지는 연한 색
  const bgColors = h.labels.map((_, i) =>
    (isGrade && h.highlight?.includes(i)) ? base + '55' : base + (isGrade ? '1a' : '99')
  );

  makeChart('chart1', {
    type: 'bar',
    data: {
      labels: h.labels,
      datasets: [{
        label: '해지건수',
        data: h.values,
        backgroundColor: bgColors,
        borderColor: 'transparent',
        borderWidth: 0,
        borderRadius: 7,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 800, easing: 'easeInOutQuart' },
      plugins: {
        legend: { labels: { color: DARK.tick } },
        tooltip: { callbacks: { label: c => `해지건수: ${c.raw}건` } },
      },
      scales: xyScale(h.y_label),
    },
    plugins: [makeBarHighlightPlugin(h.highlight, base, '건')],
  });
}


/* =====================================================
  [E-2] drawChart2(h) — 가설2: 꺾은선 (line)
  강조 포인트: 크기 키우고 흰색으로 표시
===================================================== */
function drawChart2(h) {
  const base = GRADE_COLOR[nowGrade];
  const isGrade = nowGrade !== 'ALL';

  makeChart('chart2', {
    type: 'line',
    data: {
      labels: h.labels,
      datasets: [{
        label: '해지율 (%)',
        data: h.values,
        borderColor: base,
        backgroundColor: base + '20',
        borderWidth: 2.5,
        pointRadius:          h.labels.map((_, i) => (isGrade && h.highlight?.includes(i)) ? 13 : 5),
        pointBackgroundColor: h.labels.map((_, i) => (isGrade && h.highlight?.includes(i)) ? '#fff' : base),
        pointBorderColor: base,
        pointBorderWidth:     h.labels.map((_, i) => (isGrade && h.highlight?.includes(i)) ? 3 : 1),
        tension: 0.4,
        fill: true,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700 },
      plugins: { legend: { labels: { color: DARK.tick } } },
      scales: xyScale(h.y_label),
    },
  });
}


/* =====================================================
  [E-3] drawChart3(h) — 가설3: 도넛 (doughnut)
  강조 조각: 불투명하게, 나머지: 반투명
===================================================== */
function drawChart3(h) {
  const isGrade = nowGrade !== 'ALL';
  const palette = ['#ef4444', '#f97316', '#eab308', '#22c55e']; // 4구간 색상

  makeChart('chart3', {
    type: 'doughnut',
    data: {
      labels: h.labels,
      datasets: [{
        label: '해지율 (%)',
        data: h.values,
        backgroundColor: palette.map((c, i) =>
          (isGrade && h.highlight?.includes(i)) ? c : c + (isGrade ? '44' : 'bb')
        ),
        borderColor: '#06080f',
        borderWidth: 4,
        hoverOffset: 18,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700 },
      plugins: {
        legend: { position: 'bottom', labels: { color: DARK.tick, padding: 16 } },
      },
    },
  });
}


/* =====================================================
  [E-4] drawChart4(h) — 가설4: 레이더 (radar)
  해지 고객(빨강) vs 유지 고객(초록) 비교
===================================================== */
function drawChart4(h) {
  makeChart('chart4', {
    type: 'radar',
    data: {
      labels: h.labels,
      datasets: [
        {
          label: '해지 고객',
          data: h.churn,
          backgroundColor: 'rgba(239,68,68,.18)',
          borderColor: '#ef4444',
          borderWidth: 2.5,
          pointRadius: 6,
          pointBackgroundColor: '#ef4444',
        },
        {
          label: '유지 고객',
          data: h.retain,
          backgroundColor: 'rgba(34,197,94,.18)',
          borderColor: '#22c55e',
          borderWidth: 2.5,
          pointRadius: 6,
          pointBackgroundColor: '#22c55e',
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700 },
      plugins: { legend: { labels: { color: DARK.tick } } },
      scales: {
        r: {
          ticks:       { color: DARK.tick, backdropColor: 'transparent' },
          grid:        { color: DARK.grid },
          angleLines:  { color: DARK.grid },
          pointLabels: { color: DARK.tick, font: { size: 13 } },
          beginAtZero: true,
        },
      },
    },
  });
}


/* =====================================================
  [E-5] drawChart5(h) — 가설5: 수평 막대 (bar, indexAxis:'y')
  강조 막대: 불투명 + 흰 테두리
===================================================== */
function drawChart5(h) {
  const base = GRADE_COLOR[nowGrade];
  const isGrade = nowGrade !== 'ALL';

  const bgColors     = h.labels.map((_, i) => (isGrade && h.highlight?.includes(i)) ? base       : base + (isGrade ? '22' : '99'));
  const borderColors = h.labels.map((_, i) => (isGrade && h.highlight?.includes(i)) ? '#fff'     : 'transparent');
  const borderWidths = h.labels.map((_, i) => (isGrade && h.highlight?.includes(i)) ? 2          : 0);

  makeChart('chart5', {
    type: 'bar',
    data: {
      labels: h.labels,
      datasets: [{
        label: '해지율 (%)',
        data: h.values,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: borderWidths,
        borderRadius: 7,
      }],
    },
    options: {
      indexAxis: 'y', // ← 수평 막대로 만드는 핵심 옵션
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700 },
      plugins: {
        legend: { labels: { color: DARK.tick } },
        tooltip: { callbacks: { label: c => `해지율: ${c.raw}%` } },
      },
      scales: {
        x: { ticks: { color: DARK.tick }, grid: { color: DARK.grid }, title: { display: true, text: h.y_label, color: DARK.color }, beginAtZero: true },
        y: { ticks: { color: DARK.tick }, grid: { color: DARK.grid } },
      },
    },
  });
}


/* =====================================================
  [E-6] drawChart6(h) — 가설6: 버블 (bubble)
  x=시간당요금, y=해지율, r=고객수(버블 크기)
  강조 버블: 선명한 색 + 흰 테두리 + 구간명 라벨
===================================================== */
function drawChart6(h) {
  const base = GRADE_COLOR[nowGrade];
  const isGrade = nowGrade !== 'ALL';

  const bgColors     = h.scatter.map((_, i) => (isGrade && h.highlight?.includes(i)) ? base + 'cc' : base + (isGrade ? '33' : '88'));
  const borderColors = h.scatter.map((_, i) => (isGrade && h.highlight?.includes(i)) ? '#ffffff'   : base + '66');
  const borderWidths = h.scatter.map((_, i) => (isGrade && h.highlight?.includes(i)) ? 3           : 1);

  makeChart('chart6', {
    type: 'bubble',
    data: {
      datasets: [{
        label: '요금구간별 해지율',
        data: h.scatter,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: borderWidths,
        hoverBackgroundColor: base,
        hoverBorderColor: '#ffffff',
        hoverBorderWidth: 3,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 700 },
      plugins: {
        legend: { labels: { color: DARK.tick } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const d   = ctx.raw;
              const lbl = h.labels ? h.labels[ctx.dataIndex] : '';
              return [
                `구간: ${lbl}`,
                `시간당요금: ${d.x.toFixed(4)}`,
                `해지율: ${d.y}%`,
                `고객수: ~${d.r * 300}명`,
              ];
            },
          },
        },
      },
      scales: {
        x: { ticks: { color: DARK.tick }, grid: { color: DARK.grid }, title: { display: true, text: '평균 시간당 요금',  color: DARK.color } },
        y: { ticks: { color: DARK.tick }, grid: { color: DARK.grid }, title: { display: true, text: '해지율 (%)', color: DARK.color }, beginAtZero: true },
      },
    },
    // 강조 버블 위에 구간명 텍스트 라벨 추가
    plugins: [{
      id: 'bubbleLbl',
      afterDatasetsDraw(chart) {
        if (!h.highlight || !h.highlight.length || nowGrade === 'ALL') return;

        const { ctx } = chart;
        chart.getDatasetMeta(0).data.forEach((pt, i) => {
          if (!h.highlight.includes(i)) return;

          ctx.save();
          ctx.fillStyle    = '#ffffff';
          ctx.font         = 'bold 11px Noto Sans KR, sans-serif';
          ctx.textAlign    = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(h.labels ? h.labels[i] : '', pt.x, pt.y - pt.options.radius - 6);
          ctx.restore();
        });
      },
    }],
  });
}


/* =====================================================
  [F] popCards(grade) — 카드 팝 애니메이션
  역할: 등급 변경 시 카드들이 순서대로 팝업 효과
  ★ 타이밍 바꾸려면 i*80 (80ms 간격) 수정
===================================================== */
function popCards(grade) {
  const color = GRADE_COLOR[grade];

  document.querySelectorAll('.chart-card').forEach((card, i) => {
    setTimeout(() => {
      card.style.borderColor = color;
      card.style.boxShadow   = `0 0 32px ${color}60, 0 10px 30px rgba(0,0,0,.4)`;
      card.classList.add('pop');

      // 1초 후 원래대로 복원
      setTimeout(() => {
        card.classList.remove('pop');
        card.style.borderColor = '';
        card.style.boxShadow   = '';
      }, 1000);

    }, i * 80); // 카드마다 80ms씩 딜레이
  });
}

</script>

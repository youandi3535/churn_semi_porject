<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통신 고객 이탈 예측 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 상단 컨트롤 영역 */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            gap: 20px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .risk-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .risk-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .risk-btn.active {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .btn-all {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-a {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-b {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .btn-c {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .btn-d {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }
        
        /* 챗봇 영역 */
        .chatbot-container {
            flex: 1;
            max-width: 500px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .chatbot-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .chatbot-header h3 {
            margin: 0;
            color: #667eea;
            font-size: 1.3em;
        }
        
        .chatbot-messages {
            height: 200px;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }
        
        .chat-message {
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: #e3f2fd;
            animation: fadeIn 0.5s ease;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .chat-message.auto {
            background: #f3e5f5;
            border-left: 4px solid #667eea;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-input-group {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .chat-send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .loading {
            text-align: center;
            color: #999;
            font-style: italic;
        }
        
        /* 그래프 영역 */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .chart-box.highlight {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
            border: 3px solid;
            z-index: 10;
        }
        
        .chart-box h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1em;
            text-align: center;
        }
        
        .chart-canvas {
            position: relative;
            height: 250px;
        }
        
        /* 고위험 고객 테이블 */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 30px;
        }
        
        .table-container h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        
        .risk-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .risk-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        
        .risk-table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .risk-table tr:hover {
            background: #f8f9fa;
        }
        
        .grade-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            color: white;
        }
        
        .grade-A { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .grade-B { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .grade-C { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .grade-D { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        
        /* 반응형 */
        @media (max-width: 1200px) {
            .charts-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .control-panel {
                flex-direction: column;
            }
            
            .chatbot-container {
                max-width: 100%;
            }
            
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 통신 고객 이탈 예측 대시보드</h1>
        
        <!-- 컨트롤 패널 -->
        <div class="control-panel">
            <!-- ABCD 버튼 그룹 -->
            <div class="button-group">
                <button class="risk-btn btn-all active" data-grade="ALL">전체</button>
                <button class="risk-btn btn-a" data-grade="A">A 등급<br>(최고위험)</button>
                <button class="risk-btn btn-b" data-grade="B">B 등급<br>(고위험)</button>
                <button class="risk-btn btn-c" data-grade="C">C 등급<br>(중위험)</button>
                <button class="risk-btn btn-d" data-grade="D">D 등급<br>(저위험)</button>
            </div>
            
            <!-- 챗봇 -->
            <div class="chatbot-container">
                <div class="chatbot-header">
                    <h3>🤖 AI 인사이트 챗봇</h3>
                </div>
                <div class="chatbot-messages" id="chatMessages">
                    <div class="loading">데이터를 불러오는 중...</div>
                </div>
                <div class="chat-input-group">
                    <input type="text" class="chat-input" id="chatInput" placeholder="그래프에 대해 질문해보세요...">
                    <button class="chat-send-btn" id="chatSendBtn">전송</button>
                </div>
            </div>
        </div>
        
        <!-- 6개 가설 그래프 -->
        <div class="charts-container">
            <div class="chart-box" id="chart1">
                <h3>가설1: 상담전화건수와 해지율</h3>
                <div class="chart-canvas">
                    <canvas id="canvas1"></canvas>
                </div>
            </div>
            
            <div class="chart-box" id="chart2">
                <h3>가설2: 가입일과 해지율</h3>
                <div class="chart-canvas">
                    <canvas id="canvas2"></canvas>
                </div>
            </div>
            
            <div class="chart-box" id="chart3">
                <h3>가설3: 총통화시간과 해지율</h3>
                <div class="chart-canvas">
                    <canvas id="canvas3"></canvas>
                </div>
            </div>
            
            <div class="chart-box" id="chart4">
                <h3>가설4: 시간대별 통화 비율</h3>
                <div class="chart-canvas">
                    <canvas id="canvas4"></canvas>
                </div>
            </div>
            
            <div class="chart-box" id="chart5">
                <h3>가설5: 상담강도와 해지율</h3>
                <div class="chart-canvas">
                    <canvas id="canvas5"></canvas>
                </div>
            </div>
            
            <div class="chart-box" id="chart6">
                <h3>가설6: 시간당 요금과 해지율</h3>
                <div class="chart-canvas">
                    <canvas id="canvas6"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 고위험 고객 테이블 -->
        <div class="table-container">
            <h2>🚨 고위험 고객 Top 100</h2>
            <table class="risk-table">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>고객 ID</th>
                        <th>위험 점수</th>
                        <th>위험 등급</th>
                        <th>상담전화건수</th>
                        <th>가입일</th>
                        <th>실제 해지여부</th>
                    </tr>
                </thead>
                <tbody id="riskTableBody">
                    <tr><td colspan="7" style="text-align:center;">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // 전역 변수
        let charts = {};
        let currentGraphData = null;
        let currentGrade = 'ALL';
        
        // 색상 팔레트
        const gradeColors = {
            'A': {
                primary: 'rgba(240, 147, 251, 0.8)',
                highlight: 'rgba(245, 87, 108, 1)',
                border: 'rgba(245, 87, 108, 1)'
            },
            'B': {
                primary: 'rgba(250, 112, 154, 0.8)',
                highlight: 'rgba(254, 225, 64, 1)',
                border: 'rgba(254, 225, 64, 1)'
            },
            'C': {
                primary: 'rgba(79, 172, 254, 0.8)',
                highlight: 'rgba(0, 242, 254, 1)',
                border: 'rgba(0, 242, 254, 1)'
            },
            'D': {
                primary: 'rgba(67, 233, 123, 0.8)',
                highlight: 'rgba(56, 249, 215, 1)',
                border: 'rgba(56, 249, 215, 1)'
            },
            'ALL': {
                primary: 'rgba(102, 126, 234, 0.8)',
                highlight: 'rgba(118, 75, 162, 1)',
                border: 'rgba(118, 75, 162, 1)'
            }
        };
        
        // 페이지 로드 시 초기 데이터 불러오기
        window.addEventListener('load', function() {
            loadData('ALL');
            loadHighRiskTable();
        });
        
        // ABCD 버튼 클릭 이벤트
        document.querySelectorAll('.risk-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                // 활성 버튼 표시
                document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // 데이터 로드
                const grade = this.dataset.grade;
                currentGrade = grade;
                loadData(grade);
            });
        });
        
        // 데이터 로드 함수
        async function loadData(grade) {
            try {
                const response = await fetch('/get_risk_data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({risk_grade: grade})
                });
                
                const data = await response.json();
                currentGraphData = data;
                
                // 차트 업데이트
                updateAllCharts(data, grade);
                
                // 자동 인사이트 생성
                generateAutoInsight(data);
                
            } catch (error) {
                console.error('데이터 로드 오류:', error);
            }
        }
        
        // 모든 차트 업데이트
        function updateAllCharts(data, grade) {
            const colors = gradeColors[grade];
            
            // 차트 1: 상담전화건수
            updateChart('canvas1', {
                type: 'bar',
                data: {
                    labels: data.hypothesis1.labels,
                    datasets: [{
                        label: '해지율 (%)',
                        data: data.hypothesis1.churn_rate,
                        backgroundColor: colors.primary,
                        borderColor: colors.border,
                        borderWidth: 2
                    }]
                },
                options: getChartOptions('해지율 (%)')
            });
            
            // 차트 2: 가입일
            updateChart('canvas2', {
                type: 'line',
                data: {
                    labels: data.hypothesis2.labels,
                    datasets: [{
                        label: '해지율 (%)',
                        data: data.hypothesis2.churn_rate,
                        backgroundColor: colors.primary,
                        borderColor: colors.highlight,
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: getChartOptions('해지율 (%)')
            });
            
            // 차트 3: 총통화시간
            updateChart('canvas3', {
                type: 'bar',
                data: {
                    labels: data.hypothesis3.labels,
                    datasets: [{
                        label: '해지율 (%)',
                        data: data.hypothesis3.churn_rate,
                        backgroundColor: colors.primary,
                        borderColor: colors.border,
                        borderWidth: 2
                    }]
                },
                options: getChartOptions('해지율 (%)')
            });
            
            // 차트 4: 시간대별 비율
            updateChart('canvas4', {
                type: 'radar',
                data: {
                    labels: data.hypothesis4.labels,
                    datasets: [
                        {
                            label: '해지 고객',
                            data: data.hypothesis4.churn_avg,
                            backgroundColor: 'rgba(245, 87, 108, 0.3)',
                            borderColor: 'rgba(245, 87, 108, 1)',
                            borderWidth: 2
                        },
                        {
                            label: '유지 고객',
                            data: data.hypothesis4.retain_avg,
                            backgroundColor: 'rgba(67, 233, 123, 0.3)',
                            borderColor: 'rgba(67, 233, 123, 1)',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true
                        }
                    }
                }
            });
            
            // 차트 5: 상담강도
            updateChart('canvas5', {
                type: 'bar',
                data: {
                    labels: data.hypothesis5.labels,
                    datasets: [{
                        label: '해지율 (%)',
                        data: data.hypothesis5.churn_rate,
                        backgroundColor: colors.primary,
                        borderColor: colors.border,
                        borderWidth: 2
                    }]
                },
                options: getChartOptions('해지율 (%)')
            });
            
            // 차트 6: 시간당 요금
            updateChart('canvas6', {
                type: 'bar',
                data: {
                    labels: data.hypothesis6.labels,
                    datasets: [{
                        label: '해지율 (%)',
                        data: data.hypothesis6.churn_rate,
                        backgroundColor: colors.primary,
                        borderColor: colors.border,
                        borderWidth: 2
                    }]
                },
                options: getChartOptions('해지율 (%)')
            });
            
            // 차트 박스 하이라이트 효과
            document.querySelectorAll('.chart-box').forEach(box => {
                box.classList.remove('highlight');
                setTimeout(() => {
                    box.classList.add('highlight');
                    box.style.borderColor = colors.highlight;
                }, 100);
                
                setTimeout(() => {
                    box.classList.remove('highlight');
                }, 1000);
            });
        }
        
        // 차트 옵션
        function getChartOptions(yAxisLabel) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 800,
                    easing: 'easeInOutQuart'
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'top'
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: yAxisLabel
                        }
                    }
                }
            };
        }
        
        // 차트 업데이트/생성
        function updateChart(canvasId, config) {
            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }
            const ctx = document.getElementById(canvasId).getContext('2d');
            charts[canvasId] = new Chart(ctx, config);
        }
        
        // 자동 인사이트 생성
        async function generateAutoInsight(graphData) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '<div class="loading">AI가 분석 중...</div>';
            
            try {
                const response = await fetch('/chat_insight', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        auto_mode: true,
                        graph_data: graphData
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    chatMessages.innerHTML = `<div class="chat-message auto">${result.answer}</div>`;
                } else {
                    chatMessages.innerHTML = `<div class="chat-message">${result.answer}</div>`;
                }
            } catch (error) {
                chatMessages.innerHTML = '<div class="chat-message">⚠️ 인사이트 생성 중 오류가 발생했습니다.</div>';
            }
        }
        
        // 챗봇 메시지 전송
        document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
        document.getElementById('chatInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendChatMessage();
            }
        });
        
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML += `<div class="chat-message" style="background:#fff3e0; border-left:4px solid #ff9800;">👤 ${message}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            input.value = '';
            
            chatMessages.innerHTML += '<div class="loading">AI가 답변 중...</div>';
            
            try {
                const response = await fetch('/chat_insight', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: message,
                        graph_data: currentGraphData,
                        auto_mode: false
                    })
                });
                
                const result = await response.json();
                
                // 로딩 메시지 제거
                const loadingMsg = chatMessages.querySelector('.loading');
                if (loadingMsg) loadingMsg.remove();
                
                if (result.success) {
                    chatMessages.innerHTML += `<div class="chat-message">🤖 ${result.answer}</div>`;
                } else {
                    chatMessages.innerHTML += `<div class="chat-message">${result.answer}</div>`;
                }
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
            } catch (error) {
                const loadingMsg = chatMessages.querySelector('.loading');
                if (loadingMsg) loadingMsg.remove();
                chatMessages.innerHTML += '<div class="chat-message">⚠️ 메시지 전송 중 오류가 발생했습니다.</div>';
            }
        }
        
        // 고위험 고객 테이블 로드
        async function loadHighRiskTable() {
            try {
                const response = await fetch('/high_risk_customers', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await response.json();
                const tbody = document.getElementById('riskTableBody');
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">데이터가 없습니다.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(row => `
                    <tr>
                        <td><strong>${row.순위}</strong></td>
                        <td>${row.ID}</td>
                        <td><strong>${row.위험점수}</strong></td>
                        <td><span class="grade-badge grade-${row.RISK_GRADE}">${row.RISK_GRADE}</span></td>
                        <td>${row.상담전화건수}</td>
                        <td>${row.가입일}일</td>
                        <td>${row.전화해지여부 === 1 ? '<span style="color:red;">✓ 해지</span>' : '<span style="color:green;">○ 유지</span>'}</td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('테이블 로드 오류:', error);
            }
        }
    </script>
</body>
</html>

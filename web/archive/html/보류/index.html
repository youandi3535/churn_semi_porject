<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Churn Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
        }

        .container {
            width: 95%;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin: 20px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        canvas {
            width: 100% !important;
            height: 350px !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Churn Dashboard</h2>

    <div class="grid">

        <div class="box"><canvas id="chart1"></canvas></div>
        <div class="box"><canvas id="chart2"></canvas></div>
        <div class="box"><canvas id="chart3"></canvas></div>
        <div class="box"><canvas id="chart4"></canvas></div>
        <div class="box"><canvas id="chart5"></canvas></div>
        <div class="box"><canvas id="chart6"></canvas></div>

    </div>
</div>

<script>

    // ===============================
    // 🔥 Flask에서 받은 데이터
    // ===============================

    var callLabels = {{ CALL_DATA["labels"] | tojson }};
    var callValues = {{ CALL_DATA["values"] | tojson }};
    var myList = {{ MY_KEY_MYLIST | tojson }};


    // ===============================
    // Chart 1 - Bar
    // ===============================
    new Chart(document.getElementById("chart1"), {
        type: 'bar',
        data: {
            labels: callLabels,
            datasets: [{
                label: "상담전화건수별 건수",
                data: callValues,
                backgroundColor: "rgba(54, 162, 235, 0.6)"
            }]
        }
    });


    // ===============================
    // Chart 2 - Line
    // ===============================
    new Chart(document.getElementById("chart2"), {
        type: 'line',
        data: {
            labels: callLabels,
            datasets: [{
                label: "Line Graph",
                data: callValues,
                borderColor: "black",
                fill: false
            }]
        }
    });


    // ===============================
    // Chart 3 - Pie
    // ===============================
    new Chart(document.getElementById("chart3"), {
        type: 'pie',
        data: {
            labels: callLabels,
            datasets: [{
                data: callValues,
                backgroundColor: ["#ff6384","#36a2eb","#cc65fe","#ffce56","#2ecc71","#e74c3c"]
            }]
        }
    });


    // ===============================
    // Chart 4 - Doughnut
    // ===============================
    new Chart(document.getElementById("chart4"), {
        type: 'doughnut',
        data: {
            labels: callLabels,
            datasets: [{
                data: callValues,
                backgroundColor: ["#1abc9c","#3498db","#9b59b6","#f39c12","#d35400","#2c3e50"]
            }]
        }
    });


    // ===============================
    // Chart 5 - Radar
    // ===============================
    new Chart(document.getElementById("chart5"), {
        type: 'radar',
        data: {
            labels: callLabels,
            datasets: [{
                label: "Radar",
                data: callValues,
                backgroundColor: "rgba(255,99,132,0.2)",
                borderColor: "rgb(255,99,132)"
            }]
        }
    });


    // ===============================
    // Chart 6 - MY LIST 예시
    // ===============================
    new Chart(document.getElementById("chart6"), {
        type: 'bar',
        data: {
            labels: ["맥도날드","롯데리아","버거킹","맘스터치"],
            datasets: [{
                label: "MY LIST",
                data: myList,
                backgroundColor: "purple"
            }]
        }
    });

</script>

</body>
</html>
